name: Build (Ubuntu)

on: [push, pull_request]

jobs:
  Ubuntu:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        configuration: ["Debug", "Release"]
        include:
        - configuration: Debug
          build_param: --debug
          artifact_name: cellbox-ubuntu-debug.tgz
        - configuration: Release
          build_param:
          artifact_name: cellbox-ubuntu-release.tgz
    steps:
    - name: Clone Tree
      uses: actions/checkout@v1
      with:
        fetch-depth: 1
    - name: Install Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          libsdl2-dev \
          libepoxy-dev \
          libpixman-1-dev \
          ccache
    - name: Initialize Compiler Cache
      id: cache
      uses: actions/cache@v1
      with:
        path: /tmp/cellbox-ccache
        key: cache-${{ runner.os }}-${{ matrix.configuration }}-${{ github.sha }}
        restore-keys: cache-${{ runner.os }}-${{ matrix.configuration }}-
    - name: Compile
      run: |
        export CCACHE_DIR=/tmp/cellbox-ccache
        export CCACHE_MAXSIZE=250M
        export PATH="/usr/lib/ccache:$PATH"
        ./build.sh ${{ env.BUILD_PARAM }}
        echo -e "\nCompiler Cache Stats:"
        ccache -s -c
    - name: Upload Build Artifact
      uses: actions/upload-artifact@v1
      with:
        name: dist
        path: ${{ matrix.artifact_name }}
